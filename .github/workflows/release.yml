name: Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-linux
          - platform: arm64-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1.4.4
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true

      - name: Cross-compile native gem
        run: bundle exec rb-sys-dock --platform ${{ matrix.platform }} -- rake native:${{ matrix.platform }} gem

      - uses: actions/upload-artifact@v6
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/*-${{ matrix.platform }}.gem

  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build source gem
        run: gem build gte.gemspec

      - uses: actions/upload-artifact@v6
        with:
          name: gem-source
          path: "*.gem"

  publish:
    needs: [build, source]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v6
        with:
          path: gems
          merge-multiple: true

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          for gem in gems/*.gem; do
            gem push "$gem"
          done
