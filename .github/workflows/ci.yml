name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Install Ruby dependencies
        run: nix develop -c bundle install --jobs 4 --retry 3 --without bench

      - name: Clippy
        run: nix develop -c cargo clippy --manifest-path ext/gte/Cargo.toml --no-default-features -- -D warnings

      - name: Rubocop
        run: nix develop -c bundle exec rubocop

      - name: Compile extension
        run: nix develop -c bundle exec rake compile

      - name: Run Rust tests
        run: nix develop -c cargo test --manifest-path ext/gte/Cargo.toml --no-default-features

      - name: Run Ruby tests
        run: nix develop -c bundle exec rspec

      - name: Verify RUNS ledger contains current VERSION
        run: nix develop -c bundle exec ruby bench/runs_ledger.rb verify-current-version

  cross-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-linux
          - platform: aarch64-linux
          - platform: arm64-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1.4.4
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true

      - name: Cross-compile native gem
        run: bundle exec rb-sys-dock --platform ${{ matrix.platform }} -- rake native:${{ matrix.platform }} gem
