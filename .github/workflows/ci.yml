name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Cache Bundler gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: bundler-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: bundler-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ext/gte/target
          key: cargo-${{ runner.os }}-${{ hashFiles('ext/gte/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install Ruby dependencies
        run: |
          nix develop -c bundle config set --local without bench
          nix develop -c bundle config set --local path vendor/bundle
          nix develop -c bundle install --jobs 4 --retry 3

      - name: Clippy
        run: nix develop -c cargo clippy --manifest-path ext/gte/Cargo.toml --no-default-features -- -D warnings

      - name: Rubocop
        run: nix develop -c bundle exec rubocop

      - name: Compile extension
        run: nix develop -c bundle exec rake compile

      - name: Run Rust tests
        run: nix develop -c cargo test --manifest-path ext/gte/Cargo.toml --no-default-features

      - name: Run Ruby tests
        run: nix develop -c bundle exec rspec

  cross-compile:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-linux
          - platform: arm64-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1.4.4
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true
          cargo-vendor: true

      - name: Configure bundler
        run: bundle config set --local without bench

      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.3"
